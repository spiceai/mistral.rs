name: CI / cuda

on:
  workflow_dispatch:
  pull_request:

jobs:
  test-cuda:
    # For security, only run automatically for:
    # - PRs from the same repo (not forks)
    # - manual workflow dispatch
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true

    runs-on: ubuntu-gpu-t4-4-core

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl build-essential libssl-dev protobuf-compiler pkg-config gcc-12 g++-12

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@b6fc3a9f3f15256d9d94ffe1254f9c5a2565cde6 # v0.2.30
        with:
          cuda: '12.8.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev", "nvrtc-dev"]'
          non-cuda-sub-packages: '["libcublas-dev", "libcurand-dev"]'

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy

      - name: CUDA sanity
        run: |
          nvidia-smi || true
          nvcc --version || true

      - name: Clippy (cuda)
        run: cargo clippy --features cuda
        env:
          NVCC_CCBIN: g++-12

      - name: Test (cuda)
        # T4 GPUs are SM 7.5 and do not support FP8 (needs SM >= 8.9) or
        # the bf16 kernels we gate behind COMPUTE_CAP >= 80. Skip tests
        # that exercise those code paths to keep CI green on T4 runners.
        run: |
          cargo test --features cuda -- \
            --skip blockwise_fp8::ops::tests::test_fp8_blockwise_dequant_cuda \
            --skip blockwise_fp8::ops::tests::test_fp8_blockwise_dequant_cuda_bf16 \
            --skip blockwise_fp8::ops::tests::test_fp8_blockwise_quant_dequant_roundtrip \
            --skip blockwise_fp8::ops::tests::test_blockwise_fp8_gemm \
            --skip fp8::quantize::tests::test_cublaslt_matmul \
            --skip fp8::quantize::tests::test_roundtrip_f8e4m3 \
            --skip cublaslt::tests::test_fused_batch_matmul_f8e4m3_out_bf16 \
            --skip cublaslt::tests::test_fused_batch_matmul_f8e4m3_nobias \
            --skip vector_fp8::ops::tests::test_fp8_vector_cpu_cuda_equivalence \
            --skip vector_fp8::ops::tests::test_fp8_vector_quant_dequant_roundtrip \
            --skip utils::ops::tests::test_fused_glu_matches_candle_fallback_bf16_cuda
        env:
          NVCC_CCBIN: g++-12
